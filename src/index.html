<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>S-Tier Utilities</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header" data-tauri-drag-region>
        <button
          id="sidebar-toggle"
          class="header-btn header-toggle"
          type="button"
          title="Collapse sidebar"
          aria-label="Toggle sidebar"
          aria-expanded="true"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
        </button>

        <div class="app-header-title" id="header-breadcrumb"></div>

        <div class="app-header-spacer" data-tauri-drag-region></div>

        <nav class="app-header-actions">
          <button class="header-btn" id="header-files" type="button" title="Open the app data folder">
            <span class="header-ico">📁</span><span>Files</span>
          </button>
          <button class="header-btn" id="header-docs" type="button" title="Open documentation on GitHub">
            <span class="header-ico">📖</span><span>Docs</span>
          </button>
          <button class="header-btn" id="header-settings" type="button" title="Open Settings">
            <span class="header-ico">⚙️</span><span>Settings</span>
          </button>
          <button
            class="header-btn"
            id="header-about"
            type="button"
            title="About"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="header-ico">ℹ️</span><span>About</span>
          </button>
        </nav>

        <div class="window-controls">
          <button class="win-btn" id="win-min" type="button" title="Minimize" aria-label="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
              <line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1" />
            </svg>
          </button>
          <button class="win-btn" id="win-max" type="button" title="Maximize" aria-label="Maximize">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
              <rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1" />
            </svg>
          </button>
          <button class="win-btn win-close" id="win-close" type="button" title="Close" aria-label="Close">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
              <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1" />
              <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1" />
            </svg>
          </button>
        </div>
      </header>

      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark"></div>
          <div class="sidebar-brand-text">
            <h1>S-Tier Utilities</h1>
          </div>
        </div>

        <div class="sidebar-section">
          <h2 class="sidebar-heading"><span>⭐</span> Favorites</h2>
          <ul class="sidebar-list" id="sidebar-favorites">
            <li class="sidebar-empty">No favorites yet. Tap the star on a tool.</li>
          </ul>
        </div>

        <div class="sidebar-spacer"></div>

        <nav class="sidebar-nav">
          <button class="sidebar-nav-item" data-view="library">
            <span>📚</span> Library
          </button>
          <button class="sidebar-nav-item" data-view="services">
            <span>🧩</span> Services
          </button>
          <button class="sidebar-nav-item" data-view="settings">
            <span>⚙️</span> Settings
          </button>
        </nav>
      </aside>

      <main class="content">
        <div id="view-root"></div>

        <footer class="footer">
          <span>by <a id="gh-link" href="#">stier1ba</a></span>
          <span class="dot">&middot;</span>
          <span id="version-label">v0.5.4</span>
        </footer>
      </main>
    </div>
  </body>
</html>
