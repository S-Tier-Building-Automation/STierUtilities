<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S-Tier Utilities</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark"></div>
          <div>
            <h1>S-Tier Utilities</h1>
            <p class="tagline">Little Windows utilities.</p>
          </div>
        </div>

        <div class="sidebar-section">
          <h2 class="sidebar-heading"><span>⭐</span> Favorites</h2>
          <ul class="sidebar-list" id="sidebar-favorites">
            <li class="sidebar-empty">No favorites yet. Tap the star on a tool.</li>
          </ul>
        </div>

        <div class="sidebar-spacer"></div>

        <nav class="sidebar-nav">
          <button class="sidebar-nav-item" data-view="library">
            <span>📚</span> Library
          </button>
          <button class="sidebar-nav-item" data-view="settings">
            <span>⚙️</span> Settings
          </button>
        </nav>
      </aside>

      <main class="content">
        <div id="view-root"></div>

        <footer class="footer">
          <span>by <a id="gh-link" href="#">stier1ba</a></span>
          <span class="dot">&middot;</span>
          <span id="version-label">v0.5.0</span>
        </footer>
      </main>
    </div>
  </body>
</html>
